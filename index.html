<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXENEST | Professional Gear Solutions</title>
    <style>
        @import url('https://googleapis.com');
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Roboto', sans-serif; color: #fff; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; cursor: pointer; text-align: center;
            background: radial-gradient(circle, rgba(40,40,40,0.8) 0%, rgba(0,0,0,1) 80%);
        }

        h1 { font-family: 'Permanent Marker', cursive; font-size: 5rem; text-transform: uppercase; font-style: italic; margin: 0; }
        p { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; opacity: 0.8; }
        .btn { padding: 12px 40px; border: 1px solid #fff; background: transparent; color: white; font-weight: 700; text-transform: uppercase; margin-top: 40px; cursor: pointer; }

        #video-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 200; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>AXENEST</h1>
        <p>Play fast, stay organized — all in one stand.</p>
        <div class="btn" onclick="startPrank()">Shop Now</div>
    </div>

    <div id="video-container">
        <!-- Ensure the video file is named 'rickroll.mp4' and is in the same folder -->
        <video id="myVideo">
            <source src="rickroll.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        function startPrank() {
            const video = document.getElementById('myVideo');
            const container = document.getElementById('video-container');
            const overlay = document.getElementById('overlay');

            container.style.display = 'block';
            overlay.style.display = 'none';

            video.play(); // This works because it follows a user click

            // Optional: Force actual fullscreen
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }
        }
    </script>
</body>
</html>
